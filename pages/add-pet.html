<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Pet - PawDose</title>

<link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="login-container">

<h1>🐶 Add Pet</h1>

<input id="petName" type="text" placeholder="Pet Name">

<input id="species" type="text" placeholder="Species (Dog/Cat/etc.)">

<input id="breed" type="text" placeholder="Breed">

<input id="age" type="number" placeholder="Age">

<input id="weight" type="number" placeholder="Weight (kg)">

<button onclick="savePet()">Save Pet</button>

</div>

<script>

function savePet() {

    const pet = {
        name: document.getElementById("petName").value,
        species: document.getElementById("species").value,
        breed: document.getElementById("breed").value,
        age: document.getElementById("age").value,
        weight: document.getElementById("weight").value
    };

    if (
        pet.name === "" ||
        pet.species === "" ||
        pet.breed === "" ||
        pet.age === "" ||
        pet.weight === ""
    ) {
        alert("Please fill all fields.");
        return;
    }

    let pets = JSON.parse(localStorage.getItem("pets"));

    if (!Array.isArray(pets)) {
        pets = [];
    }

    pets.push(pet);

    localStorage.setItem("pets", JSON.stringify(pets));

    window.location.href = "dashboard.html";

}

      </script>
</body>
</html>
