<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pet Profile</title>

<link rel="stylesheet" href="../style.css">

<style>
body{
font-family:Arial,sans-serif;
background:#f5f8ff;
padding:30px;
}

.card{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
}

.info{
text-align:left;
margin-top:20px;
font-size:20px;
line-height:2;
}

button{
width:100%;
padding:15px;
margin-top:25px;
border:none;
border-radius:12px;
background:#4f8df7;
color:white;
font-size:18px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<h1>🐶 Pet Profile</h1>

<div class="info">

<p><b>Name:</b> <span id="name"></span></p>

<p><b>Species:</b> <span id="species"></span></p>

<p><b>Breed:</b> <span id="breed"></span></p>

<p><b>Age:</b> <span id="age"></span></p>

<p><b>Weight:</b> <span id="weight"></span> kg</p>

</div>

<button onclick="history.back()">Back</button>

</div>

<script>

const pet = JSON.parse(localStorage.getItem("pet"));

if(pet){

document.getElementById("name").innerText = pet.name;

document.getElementById("species").innerText = pet.species;

document.getElementById("breed").innerText = pet.breed;

document.getElementById("age").innerText = pet.age;

document.getElementById("weight").innerText = pet.weight;

}

</script>

</body>
</html>
