<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Profile</title>

<link rel="stylesheet" href="../style.css">

<style>

body{
background:#f5f8ff;
font-family:Poppins,sans-serif;
padding:30px;
}

.login-container{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.info{
font-size:28px;
margin:15px 0;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
background:#4f8df7;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-container">

<h1>🐶 Pet Profile</h1>

<div class="info"><b>Name:</b> <span id="name"></span></div>

<div class="info"><b>Species:</b> <span id="species"></span></div>

<div class="info"><b>Breed:</b> <span id="breed"></span></div>

<div class="info"><b>Age:</b> <span id="age"></span></div>

<div class="info"><b>Weight:</b> <span id="weight"></span> kg</div>

<button onclick="deletePet()">Delete Pet</button>

<button onclick="window.location.href='dashboard.html'">Back</button>

</div>

<script>

let pets = JSON.parse(localStorage.getItem("pets")) || [];

let index = Number(localStorage.getItem("selectedPet"));

if (index >= 0 && index < pets.length) {

    let pet = pets[index];

    document.getElementById("name").innerText = pet.name;
    document.getElementById("species").innerText = pet.species;
    document.getElementById("breed").innerText = pet.breed;
    document.getElementById("age").innerText = pet.age;
    document.getElementById("weight").innerText = pet.weight;

}

function deletePet() {

    pets.splice(index, 1);

    localStorage.setItem("pets", JSON.stringify(pets));

    window.location.href = "dashboard.html";

}

</script>

</body>
</html>
