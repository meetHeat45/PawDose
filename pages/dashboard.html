<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawDose Dashboard</title>

<link rel="stylesheet" href="../style.css">

<style>
body{
background:#f5f8ff;
font-family:Poppins,sans-serif;
padding:30px;
}

.dashboard{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:20px;
margin:20px 0;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#4f8df7;
color:white;
font-size:18px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="dashboard">

<h1>🐶 PawDose</h1>

<div class="card">

<h2>🐶 My Pets</h2>

<a id="petDisplay" href="pet.html">No pets added yet.</a>

<a href="add-pet.html">
<button>Add Pet</button>
</a>

</div>

<div class="card">
<h2>Medication</h2>
<p>No medications added yet.</p>
<button>Add Medication</button>
</div>

<div class="card">
<h2>Reminders</h2>
<p>No reminders scheduled.</p>
<button>Create Reminder</button>
</div>

</div>

  <script>
const petName = localStorage.getItem("petName");

if (petName) {
    document.getElementById("petDisplay").innerText = "🐶 " + petName;
}
  </script>
</body>
</html>
