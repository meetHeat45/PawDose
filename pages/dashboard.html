<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawDose Dashboard</title>

<link rel="stylesheet" href="../style.css">

<style>
body{
background:#f5f8ff;
font-family:Poppins,sans-serif;
padding:30px;
}

.dashboard{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:20px;
margin:20px 0;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
}
</style>

</head>

<body>

<div class="dashboard">

<h1>🐶 PawDose</h1>

<div class="card">
<h2>🐶 My Pets</h2>

<a id="petDisplay" href="pet.html">
No pets added yet.
</a>

<br><br>

<a href="add-pet.html">
<button>Add Pet</button>
</a>

</div>

<div class="card">
<h2>💊 Medication</h2>
<p>No medications added yet.</p>
<button>Add Medication</button>
</div>

<div class="card">
<h2>🔔 Reminders</h2>
<p>No reminders scheduled.</p>
<button>Create Reminder</button>
</div>

</div>

<script>
const pet = JSON.parse(localStorage.getItem("pet"));

if (pet) {
    document.getElementById("petDisplay").innerHTML = "🐶 " + pet.name;
}
</script>

</body>
</html>
