<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawDose Dashboard</title>

<link rel="stylesheet" href="../style.css">

<style>
body{
background:#f5f8ff;
font-family:Poppins,sans-serif;
padding:30px;
}

.dashboard{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:20px;
margin:20px 0;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
}

.pet-card{
background:#eef5ff;
padding:15px;
border-radius:12px;
margin:12px 0;
}

.pet-card a{
text-decoration:none;
font-size:20px;
font-weight:bold;
color:#4f8df7;
}
</style>

</head>

<body>

<div class="dashboard">

<h1>🐶 PawDose</h1>

<div class="card">

<h2>My Pets</h2>

<div id="petList"></div>

<a href="add-pet.html">
<button>Add Pet</button>
</a>

</div>

</div>

<script>

let pets = JSON.parse(localStorage.getItem("pets")) || [];

let html = "";

pets.forEach((pet,index)=>{

html += `
<div class="pet-card">
<a href="pet.html">🐶 ${pet.name}</a>
</div>
`;

});

if(html==""){
html="<p>No pets added yet.</p>";
}

document.getElementById("petList").innerHTML=html;

</script>

</body>
</html>
